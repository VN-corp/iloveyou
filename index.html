<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thiệp Pop-up I Love You</title>
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .card {
      width: 320px;
      height: 560px;
      position: relative;
      perspective: 1200px;
      cursor: pointer;
    }

    .card-inner {
      position: absolute;
      width: 100%;
      height: 100%;
      transition: transform 0.9s cubic-bezier(0.68, -0.55, 0.27, 1.55);
      transform-style: preserve-3d;
      box-shadow: 0 20px 40px rgba(0,0,0,0.25);
      border-radius: 20px;
    }

    .card.open .card-inner {
      transform: rotateY(180deg);
    }

    .front, .back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 20px;
      overflow: hidden;
    }

    .front {
      background: linear-gradient(145deg, #ff4757, #c81e2e);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .front h1 {
      font-size: 48px;
      margin: 15px 0;
      text-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }

    .back {
      background: #fff;
      transform: rotateY(180deg);
      padding: 25px;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: inset 0 0 40px rgba(0,0,0,0.08);
    }

    .figure {
      width: 180px;
      height: 240px;
      position: relative;
      transition: all 0.8s ease;
      margin: 10px 0 15px;
    }

    .card.open .figure {
      transform: scale(1.08);
    }

    /* Nhân vật */
    .head {
      width: 85px;
      height: 78px;
      background: #fff;
      border: 5px solid #222;
      border-radius: 50%;
      margin: 0 auto 8px;
      position: relative;
    }

    .eyes {
      position: absolute;
      top: 25px;
      left: 20px;
      width: 45px;
      display: flex;
      justify-content: space-between;
    }

    .eye {
      width: 14px;
      height: 20px;
      background: #222;
      border-radius: 50%;
    }

    .smile {
      position: absolute;
      top: 48px;
      left: 28px;
      width: 30px;
      height: 12px;
      border: 4px solid #222;
      border-top: none;
      border-radius: 0 0 50% 50%;
    }

    .body {
      width: 72px;
      height: 115px;
      background: #fff;
      border: 5px solid #222;
      border-top: none;
      margin: -12px auto 0;
      border-radius: 0 0 45px 45px;
    }

    .arms {
      position: absolute;
      top: 95px;
      width: 100%;
      display: flex;
      justify-content: space-between;
      transition: all 0.8s ease;
    }

    .arm {
      width: 28px;
      height: 75px;
      background: #fff;
      border: 5px solid #222;
      border-radius: 40px;
      transition: transform 0.8s ease;
    }

    .arm.left  { transform: rotate(-35deg); transform-origin: top center; }
    .arm.right { transform: rotate(35deg);  transform-origin: top center; }

    .card.open .arm.left  { transform: rotate(-65deg); }
    .card.open .arm.right { transform: rotate(65deg); }

    /* Trái tim được ôm */
    .big-heart {
      position: absolute;
      font-size: 52px;
      top: 105px;
      left: 50%;
      transform: translateX(-50%);
      transition: all 1s ease;
      z-index: 10;
    }

    .card.open .big-heart {
      transform: translateX(-50%) translateY(-28px) scale(1.18) rotate(10deg);
    }

    .text {
      font-family: 'Comic Sans MS', cursive;
      text-align: center;
      color: #222;
    }

    .top-text { font-size: 24px; margin-bottom: 8px; }
    .bottom-text { 
      font-size: 32px; 
      font-weight: bold;
      line-height: 1.1;
    }

    /* Input khu vực */
    .response-area {
      display: none;
      width: 100%;
      margin-top: 20px;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .card.open .response-area {
      display: flex;
    }

    .response-input {
      width: 100%;
      padding: 12px 16px;
      font-family: 'Comic Sans MS', cursive;
      font-size: 16px;
      border: 2px solid #ff4757;
      border-radius: 25px;
      outline: none;
      text-align: center;
    }

    .btn-submit {
      padding: 12px 40px;
      font-family: 'Comic Sans MS', cursive;
      font-size: 18px;
      font-weight: bold;
      background: #ff4757;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .btn-submit:hover {
      transform: scale(1.05);
    }

    .success-message {
      color: #ff4757;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="card" id="card">
    <div class="card-inner">
      
      <!-- Mặt trước -->
      <div class="front">
        <div style="font-size: 90px; margin-bottom: 10px;">💌</div>
        <h1>OPEN</h1>
        <p style="font-size: 18px; opacity: 0.95;">Nhấn để mở thiệp</p>
      </div>

      <!-- Mặt sau -->
      <div class="back">
        <div class="text top-text">I LOVE YOU</div>
        
        <div class="figure" id="figure">
          <div class="head">
            <div class="eyes">
              <div class="eye"></div>
              <div class="eye"></div>
            </div>
            <div class="smile"></div>
          </div>
          <div class="body"></div>
          <div class="arms">
            <div class="arm left"></div>
            <div class="arm right"></div>
          </div>
          <div class="big-heart">❤️</div>
        </div>

        <div class="text bottom-text">
          Thiiiiiiis<br>MUCH
        </div>

        <!-- Phần input -->
        <div class="response-area" id="responseArea">
          <p style="font-size: 17px; margin-bottom: 8px; color:#333;">Bạn nghĩ sao? ❤️</p>
          <input type="text" id="userInput" class="response-input" 
                 placeholder="Nhập lời nhắn của bạn..." maxlength="120">
          <button class="btn-submit" onclick="submitResponse()">Gửi lời nhắn</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ==================== FIREBASE CONFIG ====================
    const app = initializeApp(firebaseConfig);

    let db;

    function initFirebase() {
      try {
        db = getFirestore(app);
        console.log("✅ Firebase đã kết nối thành công");
      } catch (error) {
        console.error("❌ Lỗi khởi tạo Firebase:", error);
      }
    }

    const card = document.getElementById('card');
    const responseArea = document.getElementById('responseArea');

    // Mở thiệp
    card.addEventListener('click', () => {
      if (!card.classList.contains('open')) {
        card.classList.add('open');
      }
    });

    // Hỗ trợ vuốt mobile
    let touchStartX = 0;
    card.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX);
    card.addEventListener('touchend', e => {
      if (Math.abs(e.changedTouches[0].screenX - touchStartX) > 60) {
        if (!card.classList.contains('open')) {
          card.classList.add('open');
        }
      }
    });

    async function submitResponse() {
      const message = document.getElementById('userInput').value.trim();
      
      if (message === "") {
        alert("Vui lòng nhập lời nhắn ❤️");
        return;
      }

      const responseData = {
        message: message,
        timestamp: new Date().toISOString(),
        device: navigator.userAgent.substring(0, 150),
        screenSize: `${window.innerWidth}x${window.innerHeight}`,
        location: "Ninh Binh, VN"
      };

      try {
        if (db) {
          await db.collection("card_responses").add(responseData);
          console.log("✅ Đã gửi dữ liệu lên Firebase:", responseData);
        }

        responseArea.innerHTML = `
          <p class="success-message">
            ❤️ Cảm ơn lời nhắn của bạn!<br>
            Mình đã nhận rồi nhé ❤️
          </p>`;
      } catch (error) {
        console.error("Lỗi:", error);
        alert("Đã gửi lời nhắn thành công! ❤️");
      }
    }

    // Khởi tạo Firebase
    window.onload = initFirebase;
  </script>
</body>
</html>
